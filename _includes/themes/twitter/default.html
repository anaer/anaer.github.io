<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
    <meta name="author" content="{{ site.author.name }}">

    <!-- Le HTML5 shim, for IE6-8 support of HTML elements -->
    <!--[if lt IE 9]>
      <script src="{{ ASSET_PATH }}/js/html5.js"></script>
    <![endif]-->

    <!-- Le styles -->
    <link href="{{ ASSET_PATH }}/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ ASSET_PATH }}/css/style.css?body=1" rel="stylesheet" type="text/css" media="all">
    <link href="{{ ASSET_PATH }}/css/syntax.css" rel="stylesheet" type="text/css">
    <link href="{{ ASSET_PATH }}/css/toc.css" rel="stylesheet" type="text/css">
    <link href="{{ ASSET_PATH }}/css/prettify.css" rel="stylesheet" type="text/css">
    <link href="{{ ASSET_PATH }}/css/custom.css" rel="stylesheet" type="text/css">
    <script src="{{ ASSET_PATH }}/js/jquery.min.js"></script>
    <script src="{{ ASSET_PATH }}/js/jquery.toc.js"></script>
    <script src="{{ ASSET_PATH }}/js/prettify.js"></script>
    <script src="{{ ASSET_PATH }}/js/skills.js"></script>

    <!-- Le fav and touch icons -->
  <!-- Update these with your own images
    <link rel="shortcut icon" href="images/favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="72x72" href="images/apple-touch-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="114x114" href="images/apple-touch-icon-114x114.png">
  -->

  </head>

  <body>

    <div class="navbar">
      <div class="navbar-inner">
        <div class="container">
          <a class="brand" href="{{ HOME_PATH }}">{{ site.title }}</a>
          <ul class="nav">
            {% assign pages_list = site.pages %}
            {% assign group = 'navigation' %}
            {% include JB/pages_list %}
          </ul>
        </div>
      </div>
    </div>

    <div class="container">

      <div class="content">
        {{ content }}
      </div>

      <footer>
        <p>&copy; {{ site.author.name }} 2014
          with help from <a href="http://jekyllbootstrap.com" target="_blank" title="The Definitive Jekyll Blogging Framework">Jekyll Bootstrap</a>
          and <a href="http://twitter.github.com/bootstrap/" target="_blank">Twitter Bootstrap</a>
        </p>
      </footer>

    </div> <!-- /container -->

    {% include JB/analytics %}

    <script type="text/javascript">
		// 语法高亮
		$(function() {
			$('pre').addClass('prettyprint linenums').css('overflow-x', 'auto');
			window.prettyPrint && prettyPrint();
		});

		// TOC目录
    $(function(){
      $('.row').toc({
        anchorPrefix:'tocAnchor-',
        showAlways:false,
        saveShowStatus:false,
        contentsText:'Contents',
        hideText:'hide',
        showText:'show'
      });
		});

		$(function(){
			var index = Math.floor(Math.random() * tips.length);
			$('#skilltip').html("&nbsp;"+tips[index]+':&nbsp;&nbsp;<code>'+code[index]+'</code>');
		});

    </script>
  </body>
</html>
